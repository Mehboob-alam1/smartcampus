name: smartcampus
description: "Smart Campus - Integrated Complaint and Attendance Management System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.2
  firebase_messaging: ^15.1.6

  # State & routing
  provider: ^6.1.2
  go_router: ^14.6.2

  # UI & utils
  image_picker: ^1.1.2
  camera: ^0.11.0+2
  http: ^1.2.2
  intl: ^0.19.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
